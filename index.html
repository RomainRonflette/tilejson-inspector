<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TileJSON Inspector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222636;
      --border: #2e3350;
      --accent: #4f7ef8;
      --accent-dim: #2a3f7a;
      --text: #e2e6f0;
      --text-dim: #7a82a0;
      --tag-bg: #1e2640;
      --tag-text: #8fa8f8;
      --green: #3ecf8e;
      --orange: #f59e0b;
      --red: #f87171;
      --purple: #a78bfa;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    header .meta {
      display: flex;
      gap: 12px;
      margin-left: auto;
      align-items: center;
    }
    header .meta span {
      font-size: 12px;
      color: var(--text-dim);
    }
    header .meta strong { color: var(--text); }

    /* ── Drop zone ── */
    #drop-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .drop-box {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 56px 72px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
      max-width: 520px;
      width: 90%;
    }
    .drop-box:hover, .drop-box.drag-over {
      border-color: var(--accent);
      background: rgba(79,126,248,0.06);
    }
    .drop-box svg { color: var(--accent); margin-bottom: 16px; }
    .drop-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .drop-box p { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }
    .drop-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: var(--accent-dim); border-color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: #3d6de0; }
    #file-input { display: none; }

    /* URL input row */
    .url-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .url-row input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .url-row input:focus { border-color: var(--accent); }
    .url-row input::placeholder { color: var(--text-dim); }

    /* ── Main layout ── */
    #app { flex: 1; display: none; overflow: hidden; }
    #app.visible { display: flex; }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }
    .sidebar-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-header .search-wrap {
      position: relative;
    }
    .sidebar-header input {
      width: 100%;
      padding: 7px 10px 7px 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .sidebar-header input:focus { border-color: var(--accent); }
    .sidebar-header input::placeholder { color: var(--text-dim); }
    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }
    .layer-count {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      padding: 0 2px;
    }

    #layer-list {
      overflow-y: auto;
      flex: 1;
    }
    #layer-list::-webkit-scrollbar { width: 5px; }
    #layer-list::-webkit-scrollbar-track { background: transparent; }
    #layer-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .layer-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .layer-item:hover { background: var(--surface2); }
    .layer-item.active { background: var(--accent-dim); border-left: 3px solid var(--accent); padding-left: 11px; }
    .layer-item .name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      word-break: break-all;
    }
    .layer-item .badges {
      display: flex;
      gap: 5px;
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--tag-bg);
      color: var(--tag-text);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .badge.geom { color: var(--green); }
    .badge.zoom { color: var(--orange); }
    .badge.fields { color: var(--purple); }

    /* ── Detail panel ── */
    #detail {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    #detail::-webkit-scrollbar { width: 6px; }
    #detail::-webkit-scrollbar-track { background: transparent; }
    #detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #detail .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 10px;
    }
    #detail .empty svg { opacity: 0.3; }

    .detail-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      word-break: break-all;
    }
    .detail-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .fields-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .field-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      transition: border-color 0.15s;
    }
    .field-card:hover { border-color: var(--accent-dim); }
    .field-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
    }
    .field-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .field-type {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--bg);
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .field-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-dim);
    }
    .field-values {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }
    .value-tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      background: var(--tag-bg);
      color: var(--tag-text);
      border: 1px solid var(--border);
      font-family: 'SF Mono', 'Fira Code', monospace;
      cursor: default;
    }
    .value-tag:hover { border-color: var(--accent); }
    .no-values {
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* reset button in header */
    #reset-btn {
      font-size: 12px;
      padding: 5px 12px;
    }

    /* error toast */
    #error-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #3b1f1f;
      border: 1px solid var(--red);
      color: var(--red);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      z-index: 100;
    }
  </style>
</head>
<body>

<!-- Drop screen -->
<div id="drop-screen">
  <div class="drop-box" id="drop-box">
    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path d="M12 16V8m0 0-3 3m3-3 3 3M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1"/>
    </svg>
    <h2>TileJSON Inspector</h2>
    <p>Chargez un fichier TileJSON pour explorer ses couches vectorielles et leurs attributs.</p>
    <div class="drop-actions">
      <button class="btn primary" onclick="document.getElementById('file-input').click()">
        Ouvrir un fichier
      </button>
    </div>
    <div class="url-row" style="margin-top: 16px;">
      <input type="text" id="url-input" placeholder="https://… ou chemin vers un TileJSON" />
      <button class="btn" onclick="loadFromUrl()">Charger</button>
    </div>
    <input type="file" id="file-input" accept=".json,application/json">
    <p style="margin-top: 14px; font-size: 11px; color: var(--text-dim);">Glissez-déposez un fichier .json ici</p>
  </div>
</div>

<!-- Main app -->
<header style="display:none" id="app-header">
  <h1 id="header-name">TileJSON Inspector</h1>
  <div class="meta">
    <span id="header-desc"></span>
    <span>Zoom <strong id="header-zoom"></strong></span>
    <span><strong id="header-layers"></strong> couches</span>
    <button class="btn" id="reset-btn" onclick="reset()">↩ Nouveau fichier</button>
  </div>
</header>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="Filtrer les couches…" oninput="filterLayers(this.value)">
      </div>
      <div class="layer-count" id="layer-count"></div>
    </div>
    <div id="layer-list"></div>
  </div>
  <div id="detail">
    <div class="empty" id="detail-empty">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z"/>
      </svg>
      <span>Sélectionnez une couche</span>
    </div>
    <div id="detail-content" style="display:none"></div>
  </div>
</div>

<div id="error-toast"></div>

<script>
  let tilejson = null;
  let allLayers = [];

  // ── Drag & drop ──
  const dropBox = document.getElementById('drop-box');
  document.addEventListener('dragover', e => { e.preventDefault(); dropBox.classList.add('drag-over'); });
  document.addEventListener('dragleave', () => dropBox.classList.remove('drag-over'));
  document.addEventListener('drop', e => {
    e.preventDefault();
    dropBox.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });

  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) readFile(e.target.files[0]);
  });

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadFromUrl();
  });

  function readFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        loadData(data);
      } catch {
        showError('Fichier JSON invalide.');
      }
    };
    reader.readAsText(file);
  }

  async function loadFromUrl() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      loadData(data);
    } catch (err) {
      showError(`Impossible de charger : ${err.message}`);
    }
  }

  function loadData(data) {
    if (!data.vector_layers && !data.layers) {
      showError('Aucun champ "vector_layers" trouvé dans ce TileJSON.');
      return;
    }
    tilejson = data;
    allLayers = data.vector_layers || data.layers || [];
    renderApp();
  }

  function renderApp() {
    // Header
    document.getElementById('drop-screen').style.display = 'none';
    document.getElementById('app-header').style.display = 'flex';
    document.getElementById('app').classList.add('visible');

    document.getElementById('header-name').textContent = tilejson.name || 'TileJSON Inspector';
    document.getElementById('header-desc').textContent = tilejson.description || '';
    document.getElementById('header-zoom').textContent = `${tilejson.minzoom ?? '?'}–${tilejson.maxzoom ?? '?'}`;
    document.getElementById('header-layers').textContent = allLayers.length;

    renderLayerList(allLayers);
  }

  function renderLayerList(layers) {
    const list = document.getElementById('layer-list');
    document.getElementById('layer-count').textContent = `${layers.length} / ${allLayers.length} couche${allLayers.length > 1 ? 's' : ''}`;
    list.innerHTML = '';
    layers.forEach(layer => {
      const item = document.createElement('div');
      item.className = 'layer-item';
      item.dataset.id = layer.id;
      const fieldCount = layer.fieldsCount ?? Object.keys(layer.fields || {}).length;
      item.innerHTML = `
        <div class="name">${layer.id}</div>
        <div class="badges">
          <span class="badge geom">${layer.geometry || 'GEOMETRY'}</span>
          <span class="badge zoom">z${layer.minzoom ?? '?'}–${layer.maxzoom ?? '?'}</span>
          <span class="badge fields">${fieldCount} champ${fieldCount !== 1 ? 's' : ''}</span>
        </div>`;
      item.addEventListener('click', () => {
        document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        showDetail(layer);
      });
      list.appendChild(item);
    });
  }

  function filterLayers(q) {
    const lower = q.toLowerCase();
    const filtered = allLayers.filter(l => l.id.toLowerCase().includes(lower));
    renderLayerList(filtered);
  }

  const TYPE_COLOR = {
    'text': '#3ecf8e',
    'character varying': '#3ecf8e',
    'integer': '#f59e0b',
    'double precision': '#f59e0b',
    'boolean': '#a78bfa',
  };

  function typeColor(type) {
    const t = (type || '').toLowerCase();
    for (const [k, v] of Object.entries(TYPE_COLOR)) {
      if (t.startsWith(k)) return v;
    }
    return '#7a82a0';
  }

  function showDetail(layer) {
    document.getElementById('detail-empty').style.display = 'none';
    const content = document.getElementById('detail-content');
    content.style.display = 'block';

    const fields = layer.fields || {};
    const fieldKeys = Object.keys(fields);
    const fieldCount = layer.fieldsCount ?? fieldKeys.length;

    let fieldsHtml = '';
    if (fieldKeys.length === 0) {
      fieldsHtml = '<p style="color:var(--text-dim); font-size:13px;">Aucun attribut défini pour cette couche.</p>';
    } else {
      fieldsHtml = '<div class="fields-grid">';
      fieldKeys.forEach(key => {
        const f = fields[key];
        const values = f.values || [];
        const color = typeColor(f.type);
        const countStr = f.count != null ? `${f.count.toLocaleString('fr')} entité${f.count > 1 ? 's' : ''}` : '';

        let valuesHtml = '';
        if (values.length > 0) {
          valuesHtml = `<div class="field-values">${values.map(v => `<span class="value-tag">${v}</span>`).join('')}</div>`;
        } else {
          valuesHtml = `<div class="no-values">Valeurs libres (${countStr ? countStr : 'aucune statistique'})</div>`;
        }

        fieldsHtml += `
          <div class="field-card">
            <div class="field-header">
              <span class="field-name">${key}</span>
              <span class="field-type" style="color:${color}">${f.type || 'inconnu'}</span>
              ${countStr ? `<span class="field-count">${countStr}</span>` : ''}
            </div>
            ${valuesHtml}
          </div>`;
      });
      fieldsHtml += '</div>';
    }

    content.innerHTML = `
      <div class="detail-title">${layer.id}</div>
      <div class="detail-meta">
        <span class="badge geom" style="font-size:12px; padding:4px 10px;">${layer.geometry || 'GEOMETRY'}</span>
        <span class="badge zoom" style="font-size:12px; padding:4px 10px;">Zoom ${layer.minzoom ?? '?'} → ${layer.maxzoom ?? '?'}</span>
        <span class="badge fields" style="font-size:12px; padding:4px 10px;">${fieldCount} champ${fieldCount !== 1 ? 's' : ''}</span>
      </div>
      <div class="section-title">Attributs</div>
      ${fieldsHtml}
    `;
  }

  function reset() {
    tilejson = null;
    allLayers = [];
    document.getElementById('drop-screen').style.display = 'flex';
    document.getElementById('app-header').style.display = 'none';
    document.getElementById('app').classList.remove('visible');
    document.getElementById('detail-empty').style.display = 'flex';
    document.getElementById('detail-content').style.display = 'none';
    document.getElementById('file-input').value = '';
    document.getElementById('url-input').value = '';
    document.getElementById('search').value = '';
  }

  function showError(msg) {
    const t = document.getElementById('error-toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 4000);
  }
</script>
</body>
</html>
