<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TileJSON Inspector</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Drop screen -->
<div id="drop-screen">
  <select class="lang-select btn" onchange="setLang(this.value)" style="position:absolute;top:12px;right:16px">
    <option value="en">EN</option>
    <option value="fr">FR</option>
  </select>
  <div class="drop-box" id="drop-box">
    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path d="M12 16V8m0 0-3 3m3-3 3 3M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1"/>
    </svg>
    <h2>TileJSON Inspector</h2>
    <p data-i18n="drop.subtitle">Load a TileJSON file to explore its vector layers and attributes.</p>
    <div class="drop-actions">
      <button class="btn primary" onclick="document.getElementById('file-input').click()" data-i18n="drop.openFile">Open a file</button>
    </div>
    <div class="url-row">
      <input type="text" id="url-input" data-i18n-placeholder="url.placeholder" placeholder="https://… or path to a TileJSON">
      <button class="btn" onclick="loadFromUrl()" data-i18n="drop.load">Load</button>
    </div>
    <input type="file" id="file-input" accept=".json,application/json">
    <p class="drop-hint" data-i18n="drop.hint">Drag and drop a .json file here</p>
    <div id="schema-list" style="display:none">
      <p data-i18n="drop.schemas">Available schemas</p>
      <div id="schema-items"></div>
    </div>
  </div>
</div>

<!-- Header -->
<header style="display:none" id="app-header">
  <h1 id="header-name">TileJSON Inspector</h1>
  <div class="meta">
    <span id="header-desc"></span>
    <span><span data-i18n="header.zoom">Zoom</span> <strong id="header-zoom"></strong></span>
    <span id="header-layers-text"></span>
    <select class="lang-select btn" onchange="setLang(this.value)">
      <option value="en">EN</option>
      <option value="fr">FR</option>
    </select>
    <button class="btn" id="reset-btn" onclick="reset()" data-i18n="header.reset">↩ Change TileJSON</button>
  </div>
</header>

<!-- Main 3-column layout -->
<div id="main">

  <!-- Col 1: Layer list -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" data-i18n-placeholder="sidebar.search" placeholder="Filter layers…" oninput="filterLayers(this.value)">
      </div>
      <div class="layer-count" id="layer-count"></div>
    </div>
    <div id="layer-list"></div>
  </div>

  <!-- Col 2: Attribute detail -->
  <div id="detail">
    <div id="detail-scroll">
      <div class="empty" id="detail-empty">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z"/>
        </svg>
        <span data-i18n="detail.empty">Select a layer</span>
      </div>
      <div id="detail-content" style="display:none"></div>
    </div>
  </div>

  <!-- Col 3: Map -->
  <div id="map-container">
    <div id="map"></div>
    <div id="geocoder-bar">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="geocoder-input" type="text" data-i18n-placeholder="geocoder.placeholder" placeholder="Rechercher un lieu…" autocomplete="off">
      <ul id="geocoder-results"></ul>
    </div>
    <div id="map-zoom-indicator">z&#8201;<span id="map-zoom-value"></span></div>
    <div id="map-zoom-alert">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span id="map-zoom-alert-text"></span>
      <button id="map-zoom-alert-btn"></button>
    </div>
    <div id="map-bounds-alert">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="map-bounds-alert-text"></span>
    </div>
    <div id="map-filter-chip">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
      <span id="map-filter-text"></span>
      <button onclick="clearValueFilter()" data-i18n-title="filter.remove" title="Remove filter">×</button>
    </div>
  </div>

</div>

<div id="error-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
